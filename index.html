<html>
<body>
<h1>Hello World</h1>
<p>This is a test page for google five star rating.</p>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script>
jQuery(function() { 
    (function(){

        setTimeout(function(){
            var script = document.createElement('script');
            script.type='application/ld+json';
            script.text = JSON.stringify({
                "@context": "http://schema.org",
                "@type": "LocalBusiness",
                "aggregateRating": {
                    "@type": "AggregateRating",
                    "ratingValue": "4.6",
                    "reviewCount": "243"
                },
                "url": "https://github.com/liebsoer"
            });
            script.id = 'ld-json-data';
            document.getElementsByTagName('body')[0].appendChild(script);
        }, 200);

        jQuery
            .getJSON('data.json', {'format': 'json'})
            .done(function(data){
                jQuery('body').append(
                    jQuery('<script type="application/ld+json" id="ld-json-async">').html(JSON.stringify(data))
                );
            })
        ;
    })();
});
</script>
</body>
</html>
